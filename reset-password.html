<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movia — Nova Senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="login-layout">
        <!-- Main Form Centered (We will not use the image column here to make it focused) -->
        <div class="login-right" style="width: 100%; border: none; background: linear-gradient(135deg, #F0F4FF 0%, #FFFFFF 100%);">
            
            <!-- Abstract background like in success.html -->
            <div style="position: absolute; width: 600px; height: 600px; border-radius: 50%; background: rgba(96, 165, 250, 0.15); top: -200px; left: -200px; filter: blur(80px); z-index: 1;"></div>
            <div style="position: absolute; width: 500px; height: 500px; border-radius: 50%; background: rgba(37, 99, 235, 0.1); bottom: -100px; right: -100px; filter: blur(80px); z-index: 1;"></div>

            <div class="login-form-container" style="position: relative; z-index: 2; background: white; padding: 4rem 3rem; border-radius: 20px; box-shadow: 0 24px 48px -12px rgba(30, 64, 175, 0.15); max-width: 440px;">
                <div class="brand" style="margin-bottom: 2rem;">
                    <img src="logo-movia.png" alt="Movia" style="height: 42px; width: auto; max-width: 200px; display: block; margin-left: -8px;" class="brand-logo">
                </div>
                
                <div class="form-header">
                    <h2>Criar nova senha</h2>
                    <p>Digite sua nova senha. Certifique-se de que ela é forte e segura.</p>
                </div>
                
                <form class="login-form" id="resetForm">
                    <div class="form-group">
                        <label for="password">Nova Senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" id="togglePassword">
                                <i data-lucide="eye" id="eyeIcon" class="icon-sm"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Nova Senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" id="toggleConfirm">
                                <i data-lucide="eye" id="eyeConfirmIcon" class="icon-sm"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary" style="margin-top: 1rem;">Redefinir Senha e Entrar</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Integrando Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        lucide.createIcons();

        // Setup password toggles
        function setupToggle(inputId, buttonId, iconId) {
            document.getElementById(buttonId).addEventListener('click', function () {
                const inputField = document.getElementById(inputId);
                const iconField = document.getElementById(iconId);
                const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                inputField.setAttribute('type', type);
                
                if (type === 'password') {
                    iconField.setAttribute('data-lucide', 'eye');
                } else {
                    iconField.setAttribute('data-lucide', 'eye-off');
                }
                lucide.createIcons();
            });
        }
        setupToggle('password', 'togglePassword', 'eyeIcon');
        setupToggle('confirmPassword', 'toggleConfirm', 'eyeConfirmIcon');

        // Configuração do Supabase
        const SUPABASE_URL = 'https://lwzcinuzqgogrgsgfnjf.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_yu0syRT8oiLCD2tz-K8ipA_KUiyFrbU';
        
        let supabaseApp = null;
        try {
            if(SUPABASE_URL.startsWith('http')) {
                supabaseApp = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch(e) {}

        const form = document.getElementById('resetForm');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert("As senhas não coincidem!");
                return;
            }

            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'Salvando...';
            btn.disabled = true;

            if (!supabaseApp) {
                alert("🔔 MODO DEMONSTRAÇÃO 🔔\nPara que você veja o que acontece após mudar a senha, serei redirecionado para o dashboard!");
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
                return;
            }

            try {
                // Atualizamos a senha do user
                const { data, error } = await supabaseApp.auth.updateUser({ password: password });

                if (error) throw error;
                
                alert("Senha atualizada com sucesso! Você será redirecionado para o sistema.");
                window.location.href = 'dashboard.html';

            } catch (error) {
                alert("Erro ao redefinir a senha: " + (error.message || "Tente novamente"));
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
