<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movia — Sucesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: linear-gradient(135deg, #F0F4FF 0%, #FFFFFF 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; overflow: hidden; margin: 0; padding: 2rem;">
    
    <!-- Abstract Shapes for background -->
    <div style="position: absolute; width: 600px; height: 600px; border-radius: 50%; background: rgba(96, 165, 250, 0.15); top: -200px; left: -200px; filter: blur(80px); z-index: 1;"></div>
    <div style="position: absolute; width: 500px; height: 500px; border-radius: 50%; background: rgba(37, 99, 235, 0.1); bottom: -100px; right: -100px; filter: blur(80px); z-index: 1;"></div>

    <div style="position: relative; z-index: 2; background: white; padding: 4rem 3rem; border-radius: 24px; box-shadow: 0 24px 48px -12px rgba(30, 64, 175, 0.15); border: 1px solid rgba(255, 255, 255, 0.8); text-align: center; max-width: 520px; width: 100%;">
        
        <div style="background: #EFF6FF; width: 88px; height: 88px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1); border: 1px solid #DBEAFE;">
            <i data-lucide="check-circle-2" style="color: #2563EB; width: 44px; height: 44px;"></i>
        </div>
        
        <h1 style="font-size: 2rem; font-weight: 800; color: #111827; margin-bottom: 1rem; letter-spacing: -0.02em;">Cadastro realizado <br><span style="color: #2563EB;">com sucesso</span></h1>
        
        <p style="font-size: 1.125rem; color: #4B5563; line-height: 1.6; margin-bottom: 3rem;">
            Em breve você receberá o contato de um especialista com as informações de login por e-mail.
        </p>
        
        <a href="index.html" class="btn-primary" style="display: inline-flex; text-decoration: none; padding: 1rem 2.5rem; font-weight: 600; font-size: 1.05rem; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.15); border-radius: 12px;">Voltar para o Início</a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
